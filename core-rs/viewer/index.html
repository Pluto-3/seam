<title>seam — live monitor</title>
<style>
  body { font-family: ui-monospace, monospace; background: #0b0d10; color: #d8dee4; margin: 2rem; }
  h1 { font-size: 1.1rem; color: #8fd3ff; }
  #status { font-weight: bold; }
  #status.connected { color: #6ee7a8; }
  #status.disconnected { color: #ff8080; }
  table { border-collapse: collapse; margin-top: 1rem; }
  td { padding: 0.15rem 1rem 0.15rem 0; }
  td.label { color: #8891a0; }
  button { font-family: inherit; background: #1a1e24; color: #d8dee4; border: 1px solid #3a4150; padding: 0.4rem 0.8rem; margin-right: 0.5rem; cursor: pointer; }
  button:hover { background: #262c35; }
  #log { margin-top: 1.5rem; white-space: pre; color: #6a7280; font-size: 0.85rem; max-height: 220px; overflow-y: auto; border-top: 1px solid #262c35; padding-top: 0.5rem; }
  h2 { font-size: 0.95rem; color: #8fd3ff; margin-top: 2rem; border-top: 1px solid #262c35; padding-top: 1rem; }
  .leads { display: flex; flex-wrap: wrap; gap: 1rem; }
  .lead-card { border: 1px solid #2a303a; background: #12151a; padding: 0.75rem 1rem; width: 280px; }
  .lead-name { color: #d8dee4; font-weight: bold; }
  .lead-meta { color: #8891a0; font-size: 0.8rem; margin: 0.15rem 0 0.5rem; }
  .lead-summary { color: #b7c2cf; font-size: 0.85rem; font-style: italic; margin-top: 0.4rem; }
  .lead-bias { color: #e0a96d; font-size: 0.78rem; margin-top: 0.4rem; }
  .settlement { border: 1px solid #2a303a; background: #12151a; padding: 0.75rem 1rem; max-width: 420px; }
  .hatch-actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
  .hatch-actions button { background: #17222c; border-color: #2f4e66; }
  .hatch-actions button:hover { background: #1f3242; }
  .hatch-meta { color: #8891a0; font-size: 0.85rem; margin-bottom: 0.5rem; }
  #actionFeedback { color: #6ee7a8; font-size: 0.8rem; margin-top: 0.4rem; min-height: 1em; }
  #narrative { max-width: 620px; }
  .scene { border-left: 2px solid #2f4e66; padding: 0.5rem 0 0.5rem 0.8rem; margin-bottom: 0.6rem; }
  .scene-tick { color: #6a7280; font-size: 0.75rem; margin-bottom: 0.2rem; }
  .scene-text { color: #d8dee4; font-size: 0.92rem; line-height: 1.4; }
</style>
<h1>seam — CCTV view</h1>
<p>status: <span id="status" class="disconnected">disconnected</span></p>
<button id="connectBtn">connect</button>
<button id="disconnectBtn">disconnect</button>
<table>
  <tr><td class="label">tick</td><td id="tick">-</td></tr>
  <tr><td class="label">population</td><td id="population">-</td></tr>
  <tr><td class="label">avg energy</td><td id="avgEnergy">-</td></tr>
  <tr><td class="label">avg hunger</td><td id="avgHunger">-</td></tr>
  <tr><td class="label">cumulative trades</td><td id="trades">-</td></tr>
  <tr><td class="label">specialization index</td><td id="specIdx">-</td></tr>
</table>
<h2>what's happening</h2>
<div id="narrative"></div>
<h2>settlement</h2>
<div class="settlement" id="settlement"></div>

<h2>the hatch</h2>
<div class="hatch-meta" id="hatchMeta"></div>
<div class="hatch-actions" id="hatchActions"></div>
<div id="actionFeedback"></div>

<h2>leads</h2>
<div class="leads" id="leads"></div>
<div id="log"></div>
<script>
  let ws = null;
  const statusEl = document.getElementById("status");
  const logEl = document.getElementById("log");
  const fields = ["tick", "population", "avg_energy", "avg_hunger", "trades_cumulative", "specialization_index"];
  const elIds = { tick: "tick", population: "population", avg_energy: "avgEnergy", avg_hunger: "avgHunger", trades_cumulative: "trades", specialization_index: "specIdx" };

  function setStatus(connected) {
    statusEl.textContent = connected ? "connected" : "disconnected";
    statusEl.className = connected ? "connected" : "disconnected";
  }

  function escapeHtml(s) {
    return (s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function renderLeads(leads) {
    const container = document.getElementById("leads");
    container.innerHTML = (leads || []).map((l) => {
      const name = l.display_name || l.id;
      const ratio = l.trade_success_ratio == null ? "n/a" : `${Math.round(l.trade_success_ratio * 100)}%`;
      return `<div class="lead-card">
        <div class="lead-name">${escapeHtml(name)}${l.alive ? "" : " (dead)"}</div>
        <div class="lead-meta">${escapeHtml(l.goal)} — ${escapeHtml(l.personality)}</div>
        <div class="lead-meta">at ${escapeHtml(l.location)} | energy ${l.energy.toFixed(0)} | hunger ${l.hunger.toFixed(0)}</div>
        <div class="lead-meta">recent trade success: ${ratio} | hunger scares: ${l.hunger_scares_witnessed}</div>
        ${l.memory_summary ? `<div class="lead-summary">"${escapeHtml(l.memory_summary)}"</div>` : ""}
        <div class="lead-bias">caution bias: ${l.caution_bias.toFixed(2)}</div>
      </div>`;
    }).join("");
  }

  function renderSettlement(s) {
    if (!s) return;
    document.getElementById("settlement").innerHTML = `
      <div>node: ${escapeHtml(s.node)}</div>
      <div>population: ${s.population_alive} / ${s.roster_size}</div>
      <div>avg energy: ${s.avg_energy.toFixed(1)}</div>
      <div>avg hunger: ${s.avg_hunger.toFixed(1)}</div>
      <div>food on hand: ${s.total_food_held.toFixed(1)}</div>
    `;
  }

  function renderHatchMeta(h) {
    const el = document.getElementById("hatchMeta");
    if (!h) { el.textContent = "no hatch found"; return; }
    el.textContent = `at ${h.location} | energy ${h.energy.toFixed(0)} | hunger ${h.hunger.toFixed(0)} | ${h.alive ? "alive" : "dead"}`;
  }

  let lastNarrativeTick = null;
  function renderNarrative(scenes) {
    if (!scenes || scenes.length === 0) return;
    const latestTick = scenes[scenes.length - 1].tick;
    if (latestTick === lastNarrativeTick) return; // feed unchanged since last render, skip the rebuild
    lastNarrativeTick = latestTick;
    const container = document.getElementById("narrative");
    container.innerHTML = scenes.slice().reverse().map((s) => `
      <div class="scene">
        <div class="scene-tick">tick ${s.tick}</div>
        <div class="scene-text">${escapeHtml(s.text)}</div>
      </div>
    `).join("");
  }

  function render(snap) {
    document.getElementById("tick").textContent = snap.tick;
    document.getElementById("population").textContent = `${snap.population} / ${snap.total}`;
    document.getElementById("avgEnergy").textContent = snap.avg_energy.toFixed(1);
    document.getElementById("avgHunger").textContent = snap.avg_hunger.toFixed(1);
    document.getElementById("trades").textContent = snap.trades_cumulative;
    document.getElementById("specIdx").textContent = snap.specialization_index.toFixed(3);
    renderLeads(snap.leads);
    renderSettlement(snap.settlement);
    renderHatchMeta(snap.hatch);
    renderNarrative(snap.narrative);

    const line = `tick ${snap.tick}: pop=${snap.population}/${snap.total} spec=${snap.specialization_index.toFixed(3)} trades=${snap.trades_cumulative}\n`;
    logEl.textContent = (line + logEl.textContent).split("\n").slice(0, 40).join("\n");
  }

  async function refreshHatchActions() {
    const container = document.getElementById("hatchActions");
    try {
      const resp = await fetch("/player/candidates");
      if (!resp.ok) { container.textContent = "(no hatch)"; return; }
      const candidates = await resp.json();
      container.innerHTML = "";
      for (const c of candidates) {
        const btn = document.createElement("button");
        btn.textContent = c.description;
        btn.onclick = () => submitHatchAction(c.intent, c.description);
        container.appendChild(btn);
      }
    } catch (e) {
      container.textContent = "(disconnected from service)";
    }
  }

  async function submitHatchAction(intent, description) {
    const feedback = document.getElementById("actionFeedback");
    try {
      const resp = await fetch("/player/action", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(intent),
      });
      feedback.textContent = resp.ok ? `sent: ${description}` : `failed: ${resp.status}`;
    } catch (e) {
      feedback.textContent = "failed: could not reach service";
    }
    setTimeout(refreshHatchActions, 400); // let it land, then show fresh options
  }

  function connect() {
    if (ws) return;
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${proto}//${location.host}/ws`);
    ws.onopen = () => setStatus(true);
    ws.onclose = () => { setStatus(false); ws = null; };
    ws.onerror = () => { setStatus(false); };
    ws.onmessage = (ev) => render(JSON.parse(ev.data));
  }

  function disconnect() {
    if (ws) { ws.close(); ws = null; }
    setStatus(false);
  }

  document.getElementById("connectBtn").onclick = connect;
  document.getElementById("disconnectBtn").onclick = disconnect;
  connect();
  refreshHatchActions();
  setInterval(refreshHatchActions, 3000); // options change as the world moves, even between clicks
</script>
