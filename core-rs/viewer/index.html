<title>seam — observation deck</title>
<style>
  :root {
    --bg: #0a0c10;
    --panel: #12151b;
    --panel-alt: #171b23;
    --border: #232a35;
    --text: #d9dee6;
    --text-muted: #7c8695;
    --text-faint: #4d5563;
    --data: #8fd3ff;
    --vitality: #d9a860;
    --alert: #c1685a;
    --narrative-ink: #e9e3d4;
    --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    --serif: Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
  body { font-family: var(--mono); font-size: 14px; line-height: 1.5; padding: 1.5rem; max-width: 1180px; margin: 0 auto; }

  a { color: var(--data); }
  button {
    font-family: var(--mono); font-size: 0.85rem; background: var(--panel-alt); color: var(--text);
    border: 1px solid var(--border); border-radius: 3px; padding: 0.45rem 0.85rem; cursor: pointer;
  }
  button:hover { background: #1d2530; border-color: #34506b; }
  button:focus-visible { outline: 2px solid var(--data); outline-offset: 1px; }

  /* ---------- masthead ---------- */
  .masthead { border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1.5rem; }
  .masthead-top { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem 1.5rem; }
  .masthead-title { font-size: 1rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin: 0; }
  .masthead-title strong { color: var(--data); }
  .masthead-stats { display: flex; gap: 1.5rem; font-size: 0.85rem; color: var(--text-muted); flex-wrap: wrap; }
  .masthead-stats b { color: var(--text); font-weight: 600; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 0.4rem; position: relative; top: -1px; }
  .dot.up { background: #6ee7a8; }
  .dot.down { background: var(--alert); }
  @media (prefers-reduced-motion: no-preference) {
    .dot.up { animation: pulse 2.4s ease-in-out infinite; }
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .vitals { margin-top: 0.9rem; }
  .vitals svg { width: 100%; height: 46px; display: block; }
  .vitals-legend { display: flex; gap: 1.2rem; font-size: 0.72rem; color: var(--text-faint); margin-top: 0.3rem; }
  .vitals-legend span { display: inline-flex; align-items: center; gap: 0.35rem; }
  .swatch { width: 10px; height: 2px; display: inline-block; }

  .controls { margin-top: 0.75rem; display: flex; gap: 0.5rem; }

  /* ---------- section scaffolding ---------- */
  h2 {
    font-family: var(--mono); font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-faint); margin: 2.2rem 0 0.75rem; font-weight: 600;
  }
  h2:first-of-type { margin-top: 0; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 1rem 1.1rem; }

  /* ---------- two-column: narrative | settlement+hatch ---------- */
  .main-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 1.25rem; align-items: start; }
  @media (max-width: 860px) { .main-grid { grid-template-columns: 1fr; } }

  .narrative-panel { max-height: 480px; overflow-y: auto; }
  .scene { font-family: var(--serif); color: var(--narrative-ink); border-left: 2px solid #3a4c5c; padding: 0.15rem 0 0.15rem 0.9rem; margin-bottom: 1rem; }
  .scene:last-child { margin-bottom: 0; }
  .scene-body { font-size: 1.02rem; line-height: 1.55; }
  .scene-tick { font-family: var(--mono); font-size: 0.7rem; color: var(--text-faint); margin-bottom: 0.25rem; letter-spacing: 0.03em; }
  .empty-note { color: var(--text-faint); font-style: italic; font-family: var(--serif); }

  .side-stack { display: flex; flex-direction: column; gap: 1.25rem; }
  .kv { display: grid; grid-template-columns: auto 1fr; gap: 0.15rem 1rem; font-size: 0.88rem; }
  .kv dt { color: var(--text-muted); }
  .kv dd { margin: 0; text-align: right; color: var(--text); }
  .kv dd.warn { color: var(--vitality); }

  .settlement-sparkline svg { width: 100%; height: 34px; display: block; margin-top: 0.6rem; }

  .hatch-inventory { font-size: 0.8rem; color: var(--text-muted); margin: 0.5rem 0; }
  .hatch-actions { display: flex; flex-wrap: wrap; gap: 0.45rem; margin-top: 0.6rem; max-height: 220px; overflow-y: auto; padding-right: 0.2rem; }
  .hatch-actions button { background: #17222c; border-color: #2f4e66; font-size: 0.8rem; }
  .hatch-actions button:hover { background: #1f3242; }
  #actionFeedback { color: #6ee7a8; font-size: 0.78rem; margin-top: 0.5rem; min-height: 1em; }

  /* ---------- societies (v3 Phase 2: cards double as the switcher) ---------- */
  .societies { display: flex; flex-wrap: wrap; gap: 1rem; }
  .society-card {
    flex: 1 1 200px; text-align: left; font-family: var(--mono); color: var(--text);
    display: flex; flex-direction: column; gap: 0.25rem;
  }
  .society-card:hover { background: #171f28; border-color: #34506b; }
  .society-card.possessed { border-color: #4a8f6b; background: #131d18; }
  .society-id { font-size: 0.95rem; font-weight: 600; }
  .society-id .possessed-tag { color: #6ee7a8; font-weight: 400; font-size: 0.72rem; margin-left: 0.4rem; }
  .society-meta { color: var(--text-muted); font-size: 0.78rem; }
  .society-meta .warn { color: var(--vitality); }

  /* ---------- leads ---------- */
  .leads { display: flex; flex-wrap: wrap; gap: 1rem; }
  .lead-card { flex: 1 1 260px; }
  .lead-name { font-size: 1rem; font-weight: 600; color: var(--text); }
  .lead-name .dead-tag { color: var(--alert); font-weight: 400; font-size: 0.8rem; }
  .lead-meta { color: var(--text-muted); font-size: 0.78rem; margin: 0.2rem 0; }
  .lead-summary { font-family: var(--serif); font-style: italic; color: var(--narrative-ink); font-size: 0.92rem; margin-top: 0.55rem; line-height: 1.4; }
  .lead-metrics { display: flex; gap: 1rem; margin-top: 0.6rem; font-size: 0.74rem; color: var(--text-faint); }
  .caution-bar { width: 60px; height: 4px; background: #232a35; border-radius: 2px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 0.4rem; }
  .caution-bar-fill { height: 100%; background: var(--vitality); }

  /* ---------- crowd ---------- */
  .crowd-panel { display: flex; flex-wrap: wrap; gap: 1.5rem; align-items: center; }
  .specialty-bars { display: flex; flex-direction: column; gap: 0.4rem; min-width: 220px; }
  .specialty-row { display: flex; align-items: center; gap: 0.6rem; font-size: 0.8rem; }
  .specialty-label { width: 48px; color: var(--text-muted); }
  .specialty-track { flex: 1; height: 8px; background: #1a2029; border-radius: 4px; overflow: hidden; }
  .specialty-fill { height: 100%; background: var(--data); }
  .specialty-count { width: 24px; text-align: right; color: var(--text-faint); }
  .crowd-total { color: var(--text-muted); font-size: 0.85rem; }
  .crowd-total b { color: var(--text); }

  /* ---------- events ---------- */
  .events-feed { font-size: 0.85rem; }
  .event-row { padding: 0.3rem 0; border-bottom: 1px solid #1a1f28; display: flex; gap: 0.75rem; }
  .event-row:last-child { border-bottom: none; }
  .event-tick { color: var(--text-faint); width: 4.5rem; flex-shrink: 0; }
  .event-death { color: var(--alert); }
  .event-order { color: var(--vitality); }
  .event-cross { color: #6ee7a8; }

  /* ---------- footer log ---------- */
  #log { white-space: pre; color: var(--text-faint); font-size: 0.76rem; max-height: 160px; overflow-y: auto; }
</style>

<div class="masthead">
  <div class="masthead-top">
    <h1 class="masthead-title"><strong>seam</strong> — observation deck</h1>
    <div class="masthead-stats">
      <span><span id="statusDot" class="dot down"></span><span id="status">disconnected</span></span>
      <span>tick <b id="tick">–</b></span>
      <span>uptime <b id="uptime">–</b></span>
      <span>population <b id="population">–</b></span>
      <span>trades <b id="trades">–</b></span>
      <span>specialization <b id="specIdx">–</b></span>
    </div>
  </div>
  <div class="vitals">
    <svg id="vitalsSvg" viewBox="0 0 300 46" preserveAspectRatio="none"></svg>
    <div class="vitals-legend">
      <span><span class="swatch" style="background:#6ee7a8"></span>population</span>
      <span><span class="swatch" style="background:var(--vitality)"></span>avg hunger</span>
      <span><span class="swatch" style="background:var(--data)"></span>specialization</span>
    </div>
  </div>
  <div class="controls">
    <button id="connectBtn">connect</button>
    <button id="disconnectBtn">disconnect</button>
  </div>
</div>

<h2>societies</h2>
<div class="societies panel-row" id="societies"></div>

<div class="main-grid">
  <div>
    <h2>what's happening</h2>
    <div class="panel narrative-panel" id="narrative"><div class="empty-note">no scenes written yet</div></div>
  </div>

  <div class="side-stack">
    <div>
      <h2 id="settlementLabel">the settlement</h2>
      <div class="panel" id="settlement"></div>
    </div>
    <div>
      <h2 id="hatchLabel">the hatch (you)</h2>
      <div class="panel">
        <div class="kv" id="hatchMeta"></div>
        <div class="hatch-inventory" id="hatchInventory"></div>
        <div class="hatch-actions" id="hatchActions"></div>
        <div id="actionFeedback"></div>
      </div>
    </div>
  </div>
</div>

<h2>leads</h2>
<div class="leads panel-row" id="leads"></div>

<h2>the crowd</h2>
<div class="panel crowd-panel" id="crowd"><span class="crowd-total">loading…</span></div>

<h2>highlights</h2>
<div class="panel events-feed" id="highlights"><div class="empty-note" style="font-style:normal;color:var(--text-faint)">none yet</div></div>

<h2>events</h2>
<div class="panel events-feed" id="events"><div class="empty-note" style="font-style:normal;color:var(--text-faint)">none yet</div></div>

<h2>raw feed</h2>
<div id="log"></div>

<script>
  let ws = null;
  const statusEl = document.getElementById("status");
  const statusDot = document.getElementById("statusDot");
  const logEl = document.getElementById("log");

  const HISTORY_CAP = 300;
  const history = []; // { tick, population, avg_hunger, specialization_index }
  let settlementHistory = []; // { tick, population_alive, avg_hunger } - for whichever society is currently focused
  let focusedSocietyId = null; // tracked so a possession switch can reset settlementHistory instead of splicing two societies' numbers into one line

  function setStatus(connected) {
    statusEl.textContent = connected ? "connected" : "disconnected";
    statusDot.className = "dot " + (connected ? "up" : "down");
  }

  function escapeHtml(s) {
    return (s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function fmtUptime(secs) {
    if (secs == null) return "–";
    const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60), s = Math.floor(secs % 60);
    if (h > 0) return `${h}h ${m}m`;
    if (m > 0) return `${m}m ${s}s`;
    return `${s}s`;
  }

  // ---------- sparklines (hand-rolled SVG, no charting library) ----------
  // CSS custom properties (var(...)) don't resolve inside raw SVG
  // presentation attributes the way they do in a stylesheet or style=""
  // context, so colors here are the literal hex values, not var() refs.
  const COLOR_POPULATION = "#6ee7a8";
  const COLOR_HUNGER = "#d9a860";
  const COLOR_SPEC = "#8fd3ff";
  const EDGE_PAD = 4; // keeps a flat line at the min/max from clipping against the viewBox edge

  function normalize(values, lo, hi, height) {
    const range = hi - lo || 1;
    const usable = height - EDGE_PAD * 2;
    return values.map((v) => EDGE_PAD + (1 - (v - lo) / range) * usable);
  }

  function polylinePoints(values, width, height, lo, hi) {
    if (values.length < 2) return "";
    const ys = normalize(values, lo, hi, height);
    const step = width / (values.length - 1);
    return ys.map((y, i) => `${(i * step).toFixed(1)},${y.toFixed(1)}`).join(" ");
  }

  function renderVitals() {
    const svg = document.getElementById("vitalsSvg");
    if (history.length < 2) { svg.innerHTML = ""; return; }
    const w = 300, h = 46;
    const pop = history.map((r) => r.population);
    const hunger = history.map((r) => r.avg_hunger);
    const spec = history.map((r) => r.specialization_index);
    const popLine = polylinePoints(pop, w, h, 0, Math.max(...pop, 1));
    const hungerLine = polylinePoints(hunger, w, h, 0, 100);
    const specLine = polylinePoints(spec, w, h, 0, 1);
    svg.innerHTML = `
      <polyline points="${popLine}" fill="none" stroke="${COLOR_POPULATION}" stroke-width="1.4" />
      <polyline points="${hungerLine}" fill="none" stroke="${COLOR_HUNGER}" stroke-width="1.2" opacity="0.85" />
      <polyline points="${specLine}" fill="none" stroke="${COLOR_SPEC}" stroke-width="1.2" opacity="0.85" />
    `;
  }

  function renderSettlementSparkline(container) {
    if (settlementHistory.length < 2) { container.innerHTML = ""; return; }
    const w = 100, h = 34;
    const pop = settlementHistory.map((r) => r.population_alive);
    const maxPop = Math.max(...pop, 1);
    const line = polylinePoints(pop, w, h, 0, maxPop);
    container.innerHTML = `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${line}" fill="none" stroke="#6ee7a8" stroke-width="1.6" /></svg>`;
  }

  // ---------- panel renderers ----------
  function renderLeads(leads) {
    const container = document.getElementById("leads");
    container.innerHTML = (leads || []).map((l) => {
      const name = l.display_name || l.id;
      const ratio = l.trade_success_ratio == null ? "n/a" : `${Math.round(l.trade_success_ratio * 100)}%`;
      const biasPct = Math.round((l.caution_bias || 0) * 100 / 0.9 * 100) / 100; // 0.9 is the mechanical cap
      return `<div class="panel lead-card">
        <div class="lead-name">${escapeHtml(name)}${l.alive ? "" : ' <span class="dead-tag">(dead)</span>'}</div>
        <div class="lead-meta">${escapeHtml(l.goal)} — ${escapeHtml(l.personality)}</div>
        <div class="lead-meta">at ${escapeHtml(l.location)} · energy ${l.energy.toFixed(0)} · hunger ${l.hunger.toFixed(0)}</div>
        ${l.memory_summary ? `<div class="lead-summary">"${escapeHtml(l.memory_summary)}"</div>` : ""}
        <div class="lead-metrics">
          <span>trade success ${ratio}</span>
          <span>hunger scares ${l.hunger_scares_witnessed}</span>
          <span>caution<span class="caution-bar"><span class="caution-bar-fill" style="width:${Math.min(100, biasPct)}%"></span></span></span>
        </div>
      </div>`;
    }).join("");
  }

  // v3 Phase 2: one row of cards, one per society - the cards double as the
  // switcher (clicking one both focuses the detail panels below on it and
  // takes control of its hatch), not a separate read-only tab strip plus an
  // independent "possess" button.
  function renderSocieties(societies, possessed) {
    const container = document.getElementById("societies");
    container.innerHTML = (societies || []).map((s) => {
      const isPossessed = s.id === possessed;
      const hungerWarn = s.avg_hunger >= 50;
      return `<button class="panel society-card${isPossessed ? " possessed" : ""}" onclick="possessSociety('${s.id}')">
        <div class="society-id">${escapeHtml(s.id)}${isPossessed ? '<span class="possessed-tag">possessed</span>' : ""}</div>
        <div class="society-meta">at ${escapeHtml(s.node)} · pop ${s.population_alive}/${s.roster_size}</div>
        <div class="society-meta">energy ${s.avg_energy.toFixed(1)} · hunger <span class="${hungerWarn ? "warn" : ""}">${s.avg_hunger.toFixed(1)}</span></div>
        <div class="society-meta">food ${s.total_food_held.toFixed(1)}</div>
      </button>`;
    }).join("");
  }

  async function possessSociety(id) {
    await fetch(`/player/possess/${id}`, { method: "POST" });
    // No local state to update here - the next snapshot (already streaming
    // over the open WebSocket) carries the new possessed_society and
    // render(snap) re-points every dependent panel from that, same as
    // everything else in this file.
  }

  function renderSettlement(s) {
    if (!s) return;
    const container = document.getElementById("settlement");
    const hungerWarn = s.avg_hunger >= 50;
    container.innerHTML = `
      <dl class="kv">
        <dt>node</dt><dd>${escapeHtml(s.node)}</dd>
        <dt>population</dt><dd>${s.population_alive} / ${s.roster_size}</dd>
        <dt>avg energy</dt><dd>${s.avg_energy.toFixed(1)}</dd>
        <dt>avg hunger</dt><dd class="${hungerWarn ? "warn" : ""}">${s.avg_hunger.toFixed(1)}</dd>
        <dt>food on hand</dt><dd>${s.total_food_held.toFixed(1)}</dd>
      </dl>
      <div class="settlement-sparkline" id="settlementSpark"></div>
    `;
    renderSettlementSparkline(document.getElementById("settlementSpark"));
  }

  function renderHatchMeta(h) {
    const metaEl = document.getElementById("hatchMeta");
    const invEl = document.getElementById("hatchInventory");
    if (!h) { metaEl.innerHTML = "<dt>status</dt><dd>no hatch found</dd>"; invEl.textContent = ""; return; }
    metaEl.innerHTML = `
      <dt>location</dt><dd>${escapeHtml(h.location)}</dd>
      <dt>energy</dt><dd>${h.energy.toFixed(0)}</dd>
      <dt>hunger</dt><dd>${h.hunger.toFixed(0)}</dd>
      <dt>status</dt><dd>${h.alive ? "alive" : "dead"}</dd>
      <dt>hunger scares</dt><dd>${h.hunger_scares_witnessed}</dd>
    `;
    const inv = h.inventory || {};
    const parts = Object.entries(inv).filter(([, v]) => v > 0.01).map(([k, v]) => `${v.toFixed(1)} ${k}`);
    invEl.textContent = parts.length ? `holding: ${parts.join(", ")}` : "holding: nothing";
  }

  function renderNarrative(scenes) {
    const container = document.getElementById("narrative");
    if (!scenes || scenes.length === 0) {
      container.innerHTML = '<div class="empty-note">no scenes written yet</div>';
      return;
    }
    container.innerHTML = scenes.slice().reverse().map((s) => `
      <div class="scene">
        <div class="scene-tick">tick ${s.tick}</div>
        <div class="scene-body">${escapeHtml(s.text)}</div>
      </div>
    `).join("");
  }

  function renderEvents(events) {
    const container = document.getElementById("events");
    if (!events || events.length === 0) {
      container.innerHTML = '<div class="empty-note" style="font-style:normal;color:var(--text-faint)">none yet</div>';
      return;
    }
    // v3 Phase 4: explicit branch per kind, not a bare catch-all fallback -
    // a new kind added without one would previously have silently rendered
    // as an "order" line, referencing fields (resource/location) it doesn't
    // have.
    container.innerHTML = events.slice().reverse().map((e) => {
      const name = escapeHtml(e.display_name || e.agent_id);
      if (e.kind === "death") {
        return `<div class="event-row"><span class="event-tick">tick ${e.tick}</span><span class="event-death">${name} dies</span></div>`;
      } else if (e.kind === "order") {
        return `<div class="event-row"><span class="event-tick">tick ${e.tick}</span><span class="event-order">${name} orders ${escapeHtml(e.resource)} at ${escapeHtml(e.location)}</span></div>`;
      }
      return `<div class="event-row"><span class="event-tick">tick ${e.tick}</span><span>${name}: ${escapeHtml(e.kind)}</span></div>`;
    }).join("");
  }

  // v3 Phase 4: a separate, smaller feed from `events` - cross-society
  // trades and foreign deaths are real but comparatively rare, and sharing
  // the events feed's 30-slot cap with routine "order" traffic (frequent
  // under scarcity) was found, during verification, to crowd them out
  // entirely before a human ever saw one.
  function renderHighlights(highlights) {
    const container = document.getElementById("highlights");
    if (!highlights || highlights.length === 0) {
      container.innerHTML = '<div class="empty-note" style="font-style:normal;color:var(--text-faint)">none yet</div>';
      return;
    }
    container.innerHTML = highlights.slice().reverse().map((h) => {
      const name = escapeHtml(h.display_name || h.agent_id);
      if (h.kind === "foreign_death") {
        return `<div class="event-row"><span class="event-tick">tick ${h.tick}</span><span class="event-death">${name} dies on ${escapeHtml(h.foreign_society)}'s turf</span></div>`;
      } else if (h.kind === "cross_trade") {
        const targetName = escapeHtml(h.target_display_name || h.target);
        return `<div class="event-row"><span class="event-tick">tick ${h.tick}</span><span class="event-cross">${name} (${escapeHtml(h.society)}) trades with ${targetName} (${escapeHtml(h.target_society)})</span></div>`;
      }
      return `<div class="event-row"><span class="event-tick">tick ${h.tick}</span><span>${name}: ${escapeHtml(h.kind)}</span></div>`;
    }).join("");
  }

  // crowd specialty breakdown - fetched separately since /state doesn't carry
  // the full crowd roster (only aggregate numbers), polled at a slower cadence
  // than the tick stream since it changes rarely (only on death/rename).
  async function refreshCrowd() {
    const container = document.getElementById("crowd");
    try {
      const resp = await fetch("/agents");
      if (!resp.ok) return;
      const agents = await resp.json();
      const crowd = agents.filter((a) => a.tier === "crowd");
      const alive = crowd.filter((a) => a.alive);
      const counts = {};
      for (const a of alive) counts[a.specialty] = (counts[a.specialty] || 0) + 1;
      const max = Math.max(...Object.values(counts), 1);
      const bars = Object.entries(counts).sort((a, b) => b[1] - a[1]).map(([spec, n]) => `
        <div class="specialty-row">
          <span class="specialty-label">${escapeHtml(spec)}</span>
          <span class="specialty-track"><span class="specialty-fill" style="width:${(n / max) * 100}%"></span></span>
          <span class="specialty-count">${n}</span>
        </div>
      `).join("");
      container.innerHTML = `
        <div class="specialty-bars">${bars}</div>
        <div class="crowd-total"><b>${alive.length}</b> / ${crowd.length} crowd agents alive</div>
      `;
    } catch (e) {
      container.innerHTML = '<span class="crowd-total">(disconnected from service)</span>';
    }
  }

  function render(snap) {
    document.getElementById("tick").textContent = snap.tick;
    document.getElementById("uptime").textContent = fmtUptime(snap.uptime_secs);
    document.getElementById("population").textContent = `${snap.population} / ${snap.total}`;
    document.getElementById("trades").textContent = snap.trades_cumulative;
    document.getElementById("specIdx").textContent = snap.specialization_index.toFixed(3);

    history.push({ tick: snap.tick, population: snap.population, avg_hunger: snap.avg_hunger, specialization_index: snap.specialization_index });
    if (history.length > HISTORY_CAP) history.shift();
    renderVitals();

    const societies = snap.societies || [];
    const focused = societies.find((s) => s.id === snap.possessed_society);

    // Switching societies shouldn't splice two different societies' numbers
    // into one misleading line - reset the rolling history the moment the
    // focused society actually changes, not just refuse to update it.
    if (focused && focused.id !== focusedSocietyId) {
      focusedSocietyId = focused.id;
      settlementHistory = [];
    }
    if (focused) {
      settlementHistory.push({ tick: snap.tick, population_alive: focused.population_alive, avg_hunger: focused.avg_hunger });
      if (settlementHistory.length > HISTORY_CAP) settlementHistory.shift();
    }

    renderSocieties(societies, snap.possessed_society);
    document.getElementById("settlementLabel").textContent = focused ? `the settlement (${focused.id})` : "the settlement";
    document.getElementById("hatchLabel").textContent = focused ? `the hatch (you, ${focused.id})` : "the hatch (you)";
    renderSettlement(focused);
    renderHatchMeta(focused && focused.hatch);
    renderLeads((snap.leads || []).filter((l) => focused && l.id === focused.lead_id));
    renderNarrative(snap.narrative);
    renderEvents(snap.events);
    renderHighlights(snap.highlights);

    const line = `tick ${snap.tick}: pop=${snap.population}/${snap.total} spec=${snap.specialization_index.toFixed(3)} trades=${snap.trades_cumulative}\n`;
    logEl.textContent = (line + logEl.textContent).split("\n").slice(0, 40).join("\n");
  }

  const ACTION_GROUP_ORDER = ["REST", "CONSUME", "GATHER", "CRAFT", "SIGNAL", "MOVE", "TRADE"];

  async function refreshHatchActions() {
    const container = document.getElementById("hatchActions");
    try {
      const resp = await fetch("/player/candidates");
      if (!resp.ok) { container.textContent = "(no hatch)"; return; }
      const candidates = await resp.json();
      container.innerHTML = "";
      // Grouped by action type rather than left in whatever order the sim
      // generated them - a wall of a dozen near-identical TRADE offers reads
      // very differently from "here are your options, sorted."
      const byAction = {};
      for (const c of candidates) (byAction[c.intent.action] ??= []).push(c);
      for (const action of ACTION_GROUP_ORDER) {
        for (const c of byAction[action] || []) {
          const btn = document.createElement("button");
          btn.textContent = c.description;
          btn.onclick = () => submitHatchAction(c.intent, c.description);
          container.appendChild(btn);
        }
      }
    } catch (e) {
      container.textContent = "(disconnected from service)";
    }
  }

  async function submitHatchAction(intent, description) {
    const feedback = document.getElementById("actionFeedback");
    try {
      const resp = await fetch("/player/action", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(intent),
      });
      feedback.textContent = resp.ok ? `sent: ${description}` : `failed: ${resp.status}`;
    } catch (e) {
      feedback.textContent = "failed: could not reach service";
    }
    setTimeout(refreshHatchActions, 400);
  }

  function connect() {
    if (ws) return;
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${proto}//${location.host}/ws`);
    ws.onopen = () => setStatus(true);
    ws.onclose = () => { setStatus(false); ws = null; };
    ws.onerror = () => { setStatus(false); };
    ws.onmessage = (ev) => render(JSON.parse(ev.data));
  }

  function disconnect() {
    if (ws) { ws.close(); ws = null; }
    setStatus(false);
  }

  document.getElementById("connectBtn").onclick = connect;
  document.getElementById("disconnectBtn").onclick = disconnect;
  connect();
  refreshHatchActions();
  refreshCrowd();
  setInterval(refreshHatchActions, 3000);
  setInterval(refreshCrowd, 10000);
</script>
